<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Advisor Chatbot - CareLoop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(90deg, #f8f9fa 0%, #f8f9fa 100%),
                        linear-gradient(90deg, #ffffff 0%, #ffffff 100%);
            overflow-x: hidden;
        }

        .container {
            width: 390px;
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 0 auto;
            background: linear-gradient(90deg, #f8f9fa 0%, #f8f9fa 100%);
            min-height: 100vh;
        }

        .header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 390px;
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0px 24px 20px rgba(25, 28, 29, 0.04);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
            letter-spacing: -0.45px;
            line-height: 28px;
            white-space: nowrap;
        }

        .header-profile {
            width: 40px;
            height: 40px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 0px 0px 2px rgba(0, 72, 141, 0.1);
        }

        .header-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding: 96px 24px 128px 24px;
            overflow-y: auto;
            flex: 1;
            margin-bottom: 90px; /* Để tránh bottom nav che nội dung */
        }

        /* AI Advisor Intro */
        .ai-intro {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .ai-icon-box {
            width: 64px;
            height: 80px;
            padding-bottom: 16px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .ai-icon {
            width: 64px;
            height: 64px;
            border-radius: 24px;
            background: linear-gradient(135deg, #004891 0%, #005fb8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.1), 0px 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        .ai-icon img {
            width: 27.5px;
            height: 23.75px;
            object-fit: contain;
        }

        .ai-title {
            font-size: 24px;
            font-weight: bold;
            color: #191c1d;
            letter-spacing: -0.6px;
            line-height: 32px;
            white-space: nowrap;
            text-align: center;
        }

        .ai-subtitle {
            font-size: 14px;
            font-weight: 500;
            color: #424752;
            letter-spacing: 0.7px;
            line-height: 20px;
            text-transform: uppercase;
            white-space: nowrap;
            padding-top: 4px;
            text-align: center;
        }

        /* Message Bubble */
        .message-container {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            width: 100%;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 16px;
            background: #a0f399;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar img {
            width: 18.333px;
            height: 15.833px;
            object-fit: contain;
        }

        .message-bubble {
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(10px);
            border-left: 4px solid #1b6d24;
            border-radius: 0 16px 16px 16px;
            padding: 20px 44.72px 20px 24px;
            max-width: 290px;
            box-shadow: 0px 1px 1px rgba(0, 0, 0, 0.05);
        }

        .message-text {
            font-size: 16px;
            font-weight: 500;
            color: #191c1d;
            line-height: 26px;
            word-wrap: break-word;
        }

        /* Quick Suggestions */
        .suggestions-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 56px;
            width: 100%;
        }

        .suggestions-label {
            font-size: 10px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 15px;
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .suggestion-button {
            background: #f3f4f5;
            border: 1px solid rgba(194, 198, 212, 0.15);
            border-radius: 9999px;
            padding: 9px 17px;
            font-size: 14px;
            font-weight: 600;
            color: #00488d;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 20px;
        }

        .suggestion-button:hover {
            background: #e8e9ea;
            border-color: rgba(0, 72, 141, 0.2);
        }

        .suggestion-button:active {
            background: #dfe0e1;
        }

        /* Message Input */
        .message-input-container {
            position: fixed;
            bottom: 100px; /* Tăng lên để không bị bottom nav che */
            left: 50%;
            transform: translateX(-50%);
            width: 390px;
            padding: 0 24px;
            z-index: 50;
        }

        .input-box {
            background: rgba(225, 227, 228, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(194, 198, 212, 0.2);
            border-radius: 24px;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 9px;
            box-shadow: 0px 20px 25px -5px rgba(0, 0, 0, 0.1), 0px 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .input-plus-button {
            width: 25px;
            height: 48px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            transition: all 0.3s ease;
        }

        .plus-icon {
            width: 20px;
            height: 20px;
        }

        .plus-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 12px;
            font-size: 16px;
            font-weight: 500;
            color: #191c1d;
            outline: none;
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .input-voice-button {
            width: 25px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(117.51deg, #004891 0%, #005fb8 100%);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0px 4px 6px -1px rgba(0, 0, 0, 0.1), 0px 2px 4px -2px rgba(0, 0, 0, 0.1);
            padding: 0;
        }

        .input-voice-button:hover {
            opacity: 0.9;
        }

        .voice-icon {
            width: 14px;
            height: 19px;
        }

        .voice-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 390px;
            height: 89px;
            background: white;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-around;
            box-shadow: 0px -4px 12px rgba(0, 0, 0, 0.08);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            height: 100%;
            justify-content: center;
            position: relative;
        }

        .nav-item.active {
            background: #dbeafe;
        }

        .nav-icon {
            width: 16px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 15px;
            text-align: center;
        }

        .nav-item.active .nav-label {
            color: #1e3a8a;
        }

        .nav-item:not(.active) .nav-label {
            color: #64748b;
        }

        .nav-profile {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            overflow: hidden;
        }

        .nav-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Scrollbar styling */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .main-content::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                width: 100%;
            }

            .header {
                width: 100%;
            }

            .message-input-container {
                width: 100%;
            }

            .bottom-nav {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-title">Trò chuyện với Trợ lý ảo của bạn</div>
                <div class="header-profile">
                    <img src="https://www.figma.com/api/mcp/asset/f76d5037-91f6-4baf-a3cc-8e115e536c75" alt="Profile">
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- AI Advisor Introduction -->
            <div class="ai-intro">
                <div class="ai-icon-box">
                    <div class="ai-icon">
                        <img src="https://www.figma.com/api/mcp/asset/9e47e9eb-55d4-48bb-ace6-0ffd61a74643" alt="AI Advisor">
                    </div>
                </div>
                <h1 class="ai-title">AI Advisor CareLoop</h1>
                <p class="ai-subtitle">TRỢ LÝ SỨC KHỎE CÁ NHÂN</p>
            </div>

            <!-- AI Message -->
            <div class="message-container">
                <div class="message-avatar">
                    <img src="https://www.figma.com/api/mcp/asset/69238e48-18a5-4956-8077-65ff7ca7a8b7" alt="AI">
                </div>
                <div class="message-bubble">
                    <p class="message-text">Chào bác Hùng, con có thể giúp gì cho bác về lịch khám hoặc đơn thuốc hôm nay ạ?</p>
                </div>
            </div>

            <!-- Quick Suggestions -->
            <div class="suggestions-container">
                <div class="suggestions-label">GỢI Ý CHO BÁC</div>
                <div class="suggestions-list">
                    <button class="suggestion-button" onclick="askQuestion('Khi nào bác tái khám?')">Khi nào bác tái khám?</button>
                    <button class="suggestion-button" onclick="askQuestion('Cách dùng thuốc Metformin')">Cách dùng thuốc Metformin</button>
                    <button class="suggestion-button" onclick="askQuestion('Giải thích chỉ số đường huyết')">Giải thích chỉ số đường huyết</button>
                </div>
            </div>
        </div>

        <!-- Message Input Area -->
        <div class="message-input-container">
            <div class="input-box">
                <button class="input-plus-button" onclick="addAttachment()" title="Thêm tệp đính kèm">
                    <div class="plus-icon">
                        <img src="https://www.figma.com/api/mcp/asset/631d016d-fdcf-485c-bf25-9d9b55b2f4f0" alt="Add">
                    </div>
                </button>
                <input 
                    type="text" 
                    class="input-field" 
                    placeholder="Nhập câu hỏi của bác..." 
                    id="messageInput"
                    onkeypress="handleKeyPress(event)"
                >
                <button class="input-voice-button" onclick="startVoiceInput()" title="Ghi âm">
                    <div class="voice-icon">
                        <img src="https://www.figma.com/api/mcp/asset/b49685f0-59f4-4fb1-9714-746c03fb1cbc" alt="Voice">
                    </div>
                </button>
            </div>
        </div>

        <!-- Bottom Navigation (bổ sung) -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="navigateTo('home')">
                <div class="nav-icon">
                    <img src="https://www.figma.com/api/mcp/asset/eb0c64d9-29e8-4e8d-983b-6c367dfe1027" alt="Home">
                </div>
                <div class="nav-label">Trang chủ</div>
            </div>
            <div class="nav-item" onclick="navigateTo('appointments')">
                <div class="nav-icon">
                    <img src="https://www.figma.com/api/mcp/asset/fddc5cd0-0aef-4e16-a8bd-550720ce723b" alt="Appointments">
                </div>
                <div class="nav-label">Lịch hẹn</div>
            </div>
            <div class="nav-item active" onclick="navigateTo('ai-advisor')">
                <div class="nav-icon">
                    <img src="https://www.figma.com/api/mcp/asset/664646a0-34ad-4490-95ce-dbb6895f1738" alt="AI Advisor">
                </div>
                <div class="nav-label">AI ADVISOR</div>
            </div>
            <div class="nav-item" onclick="navigateTo('account')">
                <div class="nav-profile">
                    <img src="https://www.figma.com/api/mcp/asset/2068a450-d167-4836-a3bb-3bee13a569ab" alt="Profile">
                </div>
                <div class="nav-label">Tài khoản</div>
            </div>
        </div>
    </div>

    <script>
        // Hàm điều hướng giữa các file
        function navigateTo(page) {
            const files = {
                home: 'patient_dashboard.html',
                appointments: 'patient_appointments.html',
                'ai-advisor': 'patient_chatbot.html', // chính là file này
                account: 'patient_relative_settings.html'
            };
            if (files[page] && files[page] !== window.location.pathname.split('/').pop()) {
                window.location.href = files[page];
            }
        }

        // Các hàm chat giữ nguyên
        function askQuestion(question) {
            const input = document.getElementById('messageInput');
            input.value = question;
            console.log('Gửi câu hỏi:', question);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                const message = document.getElementById('messageInput').value.trim();
                if (message) {
                    sendMessage(message);
                    document.getElementById('messageInput').value = '';
                }
            }
        }

        function sendMessage(message) {
            console.log('Gửi tin nhắn:', message);
            addUserMessage(message);
        }

        function addUserMessage(message) {
            console.log('Thêm tin nhắn người dùng:', message);
        }

        function addAttachment() {
            console.log('Thêm tệp đính kèm...');
        }

        function startVoiceInput() {
            console.log('Bắt đầu ghi âm...');
            if ('webkitSpeechRecognition' in window) {
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'vi-VN';
                recognition.start();
                recognition.onresult = function(event) {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    document.getElementById('messageInput').value = transcript;
                };
                recognition.onerror = function(event) {
                    console.error('Lỗi ghi âm:', event.error);
                };
            } else {
                alert('Trình duyệt của bạn không hỗ trợ nhập giọng nói');
            }
        }

        window.addEventListener('load', function() {
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
