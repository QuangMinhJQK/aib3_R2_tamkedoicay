<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Advisor Chatbot - CareLoop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        .container {
            width: 390px;
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 0 auto;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 390px;
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0px 24px 20px rgba(25, 28, 29, 0.04);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
            letter-spacing: -0.45px;
            line-height: 28px;
            white-space: nowrap;
        }

        .header-profile {
            width: 40px;
            height: 40px;
            border-radius: 9999px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 0px 0px 2px rgba(0, 72, 141, 0.1);
        }

        .header-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 96px 24px 128px 24px;
            overflow-y: auto;
            flex: 1;
            margin-bottom: 90px;
        }

        .ai-intro {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .ai-icon-box {
            width: 64px;
            height: 80px;
            padding-bottom: 16px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .ai-icon {
            width: 64px;
            height: 64px;
            border-radius: 24px;
            background: linear-gradient(135deg, #004891 0%, #005fb8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .ai-icon img {
            width: 27.5px;
            height: 23.75px;
            object-fit: contain;
        }

        .ai-title {
            font-size: 24px;
            font-weight: bold;
            color: #191c1d;
            letter-spacing: -0.6px;
            line-height: 32px;
            white-space: nowrap;
            text-align: center;
        }

        .ai-subtitle {
            font-size: 14px;
            font-weight: 500;
            color: #424752;
            letter-spacing: 0.7px;
            line-height: 20px;
            text-transform: uppercase;
            white-space: nowrap;
            padding-top: 4px;
            text-align: center;
        }

        .message-container {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            width: 100%;
        }

        .message-container.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 16px;
            background: #a0f399;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .message-avatar img {
            width: 18.333px;
            height: 15.833px;
            object-fit: contain;
        }

        .message-bubble {
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(10px);
            border-left: 4px solid #1b6d24;
            border-radius: 0 16px 16px 16px;
            padding: 16px 20px;
            max-width: 290px;
            box-shadow: 0px 1px 1px rgba(0, 0, 0, 0.05);
        }

        .message-container.user .message-bubble {
            border-left: none;
            border-right: 4px solid #004891;
            border-radius: 16px 0 16px 16px;
            background: #eaf2ff;
        }

        .message-text {
            font-size: 16px;
            font-weight: 500;
            color: #191c1d;
            line-height: 26px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message-meta {
            margin-top: 8px;
            font-size: 11px;
            color: #64748b;
        }

        .audio-player {
            margin-top: 10px;
            width: 100%;
        }

        .suggestions-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-left: 56px;
            width: 100%;
        }

        .suggestions-label {
            font-size: 10px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 15px;
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .suggestion-button {
            background: #f3f4f5;
            border: 1px solid rgba(194, 198, 212, 0.15);
            border-radius: 9999px;
            padding: 9px 17px;
            font-size: 14px;
            font-weight: 600;
            color: #00488d;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 20px;
        }

        .suggestion-button:hover {
            background: #e8e9ea;
            border-color: rgba(0, 72, 141, 0.2);
        }

        .typing-indicator {
            display: none;
            font-size: 13px;
            color: #64748b;
            padding-left: 56px;
            margin-top: -8px;
        }

        .typing-indicator.show {
            display: block;
        }

        .message-input-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 390px;
            padding: 0 24px;
            z-index: 50;
        }

        .input-box {
            background: rgba(225, 227, 228, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(194, 198, 212, 0.2);
            border-radius: 24px;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 9px;
            box-shadow: 0px 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .input-plus-button {
            width: 25px;
            height: 48px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        .plus-icon {
            width: 20px;
            height: 20px;
        }

        .plus-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 12px;
            font-size: 16px;
            font-weight: 500;
            color: #191c1d;
            outline: none;
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .input-voice-button,
        .input-send-button {
            width: 34px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(117.51deg, #004891 0%, #005fb8 100%);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0px 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 0;
            color: white;
            font-size: 16px;
        }

        .input-voice-button.recording {
            background: linear-gradient(117.51deg, #dc2626 0%, #ef4444 100%);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.65; }
            100% { opacity: 1; }
        }

        .voice-icon {
            width: 14px;
            height: 19px;
        }

        .voice-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 390px;
            height: 89px;
            background: white;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-around;
            box-shadow: 0px -4px 12px rgba(0, 0, 0, 0.08);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            height: 100%;
            justify-content: center;
            position: relative;
        }

        .nav-item.active {
            background: #dbeafe;
        }

        .nav-icon {
            width: 16px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 15px;
            text-align: center;
        }

        .nav-item.active .nav-label {
            color: #1e3a8a;
        }

        .nav-item:not(.active) .nav-label {
            color: #64748b;
        }

        .nav-profile {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            overflow: hidden;
        }

        .nav-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 480px) {
            .container,
            .header,
            .message-input-container,
            .bottom-nav {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-title">Trò chuyện với Trợ lý ảo của bạn</div>
                <div class="header-profile">
                    <img src="https://www.figma.com/api/mcp/asset/f76d5037-91f6-4baf-a3cc-8e115e536c75" alt="Profile">
                </div>
            </div>
        </div>

        <div class="main-content" id="chatContainer">
            <div class="ai-intro">
                <div class="ai-icon-box">
                    <div class="ai-icon">
                        <img src="https://www.figma.com/api/mcp/asset/9e47e9eb-55d4-48bb-ace6-0ffd61a74643" alt="AI Advisor">
                    </div>
                </div>
                <h1 class="ai-title">AI Advisor CareLoop</h1>
                <p class="ai-subtitle">TRỢ LÝ SỨC KHỎE CÁ NHÂN</p>
            </div>

            <div class="message-container">
                <div class="message-avatar">
                    <img src="https://www.figma.com/api/mcp/asset/69238e48-18a5-4956-8077-65ff7ca7a8b7" alt="AI">
                </div>
                <div class="message-bubble">
                    <p class="message-text">Chào bác, con có thể giúp gì cho bác về lịch khám hoặc đơn thuốc hôm nay ạ?</p>
                </div>
            </div>

            <div class="suggestions-container" id="suggestions">
                <div class="suggestions-label">GỢI Ý CHO BÁC</div>
                <div class="suggestions-list">
                    <button class="suggestion-button" onclick="askQuestion('Khi nào tôi tái khám?')">Khi nào tôi tái khám?</button>
                    <button class="suggestion-button" onclick="askQuestion('Tôi đang dùng thuốc gì?')">Tôi đang dùng thuốc gì?</button>
                    <button class="suggestion-button" onclick="askQuestion('Tôi cần lưu ý gì sau khám?')">Tôi cần lưu ý gì sau khám?</button>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">AI Advisor đang trả lời...</div>
        </div>

        <div class="message-input-container">
            <div class="input-box">
                <button class="input-plus-button" onclick="addAttachment()" title="Thêm tệp đính kèm">
                    <div class="plus-icon">
                        <img src="https://www.figma.com/api/mcp/asset/631d016d-fdcf-485c-bf25-9d9b55b2f4f0" alt="Add">
                    </div>
                </button>

                <input
                    type="text"
                    class="input-field"
                    placeholder="Nhập câu hỏi của bác..."
                    id="messageInput"
                    onkeypress="handleKeyPress(event)"
                >

                <button class="input-send-button" onclick="sendTextFromInput()" title="Gửi">➤</button>

                <button class="input-voice-button" id="voiceButton" onclick="startVoiceInput()" title="Ghi âm">
                    <div class="voice-icon">
                        <img src="https://www.figma.com/api/mcp/asset/b49685f0-59f4-4fb1-9714-746c03fb1cbc" alt="Voice">
                    </div>
                </button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="navigateTo('home')">
                <div class="nav-icon">
                    <img src="https://www.figma.com/api/mcp/asset/eb0c64d9-29e8-4e8d-983b-6c367dfe1027" alt="Home">
                </div>
                <div class="nav-label">Trang chủ</div>
            </div>
            <div class="nav-item" onclick="navigateTo('appointments')">
                <div class="nav-icon">
                    <img src="https://www.figma.com/api/mcp/asset/fddc5cd0-0aef-4e16-a8bd-550720ce723b" alt="Appointments">
                </div>
                <div class="nav-label">Lịch hẹn</div>
            </div>
            <div class="nav-item active" onclick="navigateTo('ai-advisor')">
                <div class="nav-icon">
                    <img src="https://www.figma.com/api/mcp/asset/664646a0-34ad-4490-95ce-dbb6895f1738" alt="AI Advisor">
                </div>
                <div class="nav-label">AI ADVISOR</div>
            </div>
            <div class="nav-item" onclick="navigateTo('account')">
                <div class="nav-profile">
                    <img src="https://www.figma.com/api/mcp/asset/2068a450-d167-4836-a3bb-3bee13a569ab" alt="Profile">
                </div>
                <div class="nav-label">Tài khoản</div>
            </div>
        </div>
    </div>

    <script>
        const N8N_WEBHOOK_URL = "https://n8n.n2nai.io/webhook/chatbot-voice-advisor"
        const PATIENT_ID = new URLSearchParams(window.location.search).get('patient_id') || "771";


        function navigateTo(page) {
            const files = {
                home: 'patient_dashboard.html',
                appointments: 'patient_appointments.html',
                'ai-advisor': 'patient_chatbot.html',
                account: 'patient_relative_settings.html'
            };

            if (files[page] && files[page] !== window.location.pathname.split('/').pop()) {
                window.location.href = files[page];
            }
        }

        function askQuestion(question) {
            document.getElementById('messageInput').value = question;
            sendMessage({
                input_type: "text",
                question,
                need_voice: false
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendTextFromInput();
            }
        }

        function sendTextFromInput() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            input.value = '';

            sendMessage({
                input_type: "text",
                question: message,
                need_voice: false
            });
        }

        async function sendMessage({ input_type, question, need_voice }) {
            addUserMessage(question);
            setTyping(true);

            const payload = {
                patient_id: PATIENT_ID,
                input_type,
                question,
                need_voice
            };

            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const result = await res.json();
                const data = Array.isArray(result) ? result[0] : result;

                const answer = data.answer_text || data.answer || "Xin lỗi, hệ thống chưa có phản hồi.";
addBotMessage(answer, data);

if (need_voice === true) {
    if (data.audio_url) {
        playAudio(data.audio_url);
    } else {
        speakText(answer);
    }
}

            } catch (error) {
                console.error("Lỗi gọi n8n:", error);
                addBotMessage("Xin lỗi, hiện hệ thống chưa thể kết nối với trợ lý ảo. Bác thử lại sau nhé.");
            } finally {
                setTyping(false);
            }
        }

        function addUserMessage(message) {
            const container = document.getElementById('chatContainer');

            const html = `
                <div class="message-container user">
                    <div class="message-bubble">
                        <p class="message-text">${escapeHtml(message)}</p>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function addBotMessage(message, meta = {}) {
            const container = document.getElementById('chatContainer');

            const metaText = meta.intent
                ? `<div class="message-meta">Intent: ${escapeHtml(meta.intent)} · Action: ${escapeHtml(meta.next_action || '')}</div>`
                : '';

            const audioHtml = meta.audio_url
                ? `<audio class="audio-player" controls src="${escapeHtml(meta.audio_url)}"></audio>`
                : '';

            const html = `
                <div class="message-container">
                    <div class="message-avatar">🤖</div>
                    <div class="message-bubble">
                        <p class="message-text">${escapeHtml(message)}</p>
                        ${metaText}
                        ${audioHtml}
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function setTyping(show) {
            const indicator = document.getElementById('typingIndicator');
            indicator.classList.toggle('show', show);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }, 50);
        }

        function addAttachment() {
            alert('Tính năng đính kèm sẽ được phát triển sau.');
        }

        function startVoiceInput() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const voiceButton = document.getElementById('voiceButton');
    if (!SpeechRecognition) {
        alert('Trình duyệt chưa hỗ trợ nhận diện giọng nói. Hãy dùng Google Chrome.');
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'vi-VN';
    recognition.interimResults = true;
    recognition.continuous = false;
    recognition.maxAlternatives = 1;

    voiceButton.classList.add('recording');
    console.log("Đang nghe...");

    recognition.start();

    recognition.onresult = function(event) {
        let transcript = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        transcript = transcript.trim();
        console.log("Transcript:", transcript);

        document.getElementById('messageInput').value = transcript;

        if (event.results[event.results.length - 1].isFinal && transcript) {
            sendMessage({
                input_type: "text",
                question: transcript,
                need_voice: true
            });
        }
    };

    recognition.onerror = function(event) {
    console.error("Speech recognition error:", event.error);

    if (event.error === "no-speech") {
        alert("Không nghe thấy giọng nói. Bạn bấm mic rồi nói ngay, nói rõ hơn hoặc kiểm tra micro nhé.");
    } else if (event.error === "not-allowed") {
        alert("Bạn chưa cấp quyền micro cho trình duyệt.");
    } else if (event.error === "network") {
        alert("Lỗi mạng khi nhận diện giọng nói. Thử dùng Chrome và kiểm tra internet.");
    } else {
        alert("Lỗi ghi âm: " + event.error);
    }
};

    recognition.onend = function() {
        console.log("Dừng nghe");
        voiceButton.classList.remove('recording');
    };
}

        function playAudio(url) {
            const audio = new Audio(url);
            audio.play().catch(err => {
                console.warn("Không thể tự phát audio:", err);
            });
        }
        function speakText(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();

    const vietnameseVoice = voices.find(v => v.lang === 'vi-VN')
        || voices.find(v => v.lang.startsWith('vi'));

    if (vietnameseVoice) {
        utterance.voice = vietnameseVoice;
    }

    utterance.lang = 'vi-VN';
    utterance.rate = 0.95;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
}
        function escapeHtml(text) {
            return String(text ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        window.addEventListener('load', function() {
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
